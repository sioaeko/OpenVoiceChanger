services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - OVC_MODELS_DIR=/app/models
    restart: unless-stopped

  app-gpu:
    build:
      context: .
      target: runtime-gpu
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - OVC_MODELS_DIR=/app/models
    restart: unless-stopped
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
